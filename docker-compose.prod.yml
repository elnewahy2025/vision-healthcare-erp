version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: visionhc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-healthcare}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/backup-postgres.sh:/docker-entrypoint-initdb.d/01-backup.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: visionhc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  minio:
    image: minio/minio:latest
    container_name: visionhc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: visionhc-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-healthcare}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://localhost}
      APP_URL: ${APP_URL:-https://localhost}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: visionhc-frontend
    restart: unless-stopped
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  nginx:
    image: nginx:alpine
    container_name: visionhc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/prod.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - frontend_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: visionhc-backup
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-healthcare}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION:-7}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-}
      S3_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - visionhc-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

networks:
  visionhc-net:
    driver: bridge
    name: visionhc-network

volumes:
  postgres_data:
    name: visionhc-postgres
  redis_data:
    name: visionhc-redis
  minio_data:
    name: visionhc-minio
  backup_data:
    name: visionhc-backups
  frontend_logs:
    name: visionhc-nginx-logs
