version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: healthcare-db
    environment:
      POSTGRES_DB: healthcare2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-net

  redis:
    image: redis:7-alpine
    container_name: healthcare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - healthcare-net

  minio:
    image: minio/minio:latest
    container_name: healthcare-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - healthcare-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  create-buckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p local/healthcare;
      /usr/bin/mc policy set public local/healthcare;
      "
    networks:
      - healthcare-net

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["sh", "-c", "npx knex migrate:latest --knexfile dist/core/knexfile.js && npx knex seed:run --knexfile dist/core/knexfile.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: healthcare2
      DB_USER: postgres
      DB_PASSWORD: postgres
    networks:
      - healthcare-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: healthcare-backend
    ports:
      - "3000:3000"
    command: ["node", "dist/index.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: healthcare2
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-min-32-chars}

      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: healthcare
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CORS_ORIGIN: "*"
      APP_URL: http://localhost:5173
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      create-buckets:
        condition: service_completed_successfully
    networks:
      - healthcare-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: healthcare-nginx
    ports: # Align with README and Vite dev port for consistency
      - "5173:80"

    volumes:
      - ./deployment/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - healthcare-net

networks:
  healthcare-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
